# SENTINEL 前端 Nginx 配置
# - SPA history 路由回退到 index.html
# - /api 反向代理到后端 api 服务（含 WebSocket 升级）
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # API + WebSocket 反向代理到后端服务（compose 服务名 api）
    location /api/ {
        proxy_pass http://api:18000;
        proxy_http_version 1.1;

        # WebSocket 升级（/api/v1/ws/tasks/{id}/progress 需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传放宽体积与超时（与后端 100MB 上传对齐）
        client_max_body_size 120m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA history 路由：找不到文件时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
