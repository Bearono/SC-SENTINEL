# ============================================================
# SENTINEL 全栈本地编排（一键拉起 db + redis + api + worker + frontend）
#   启动：  docker compose up -d --build
#   访问：  前端 http://localhost:8080   后端文档 http://localhost:18000/docs
#   停止：  docker compose down
# ============================================================
services:
  # ── PostgreSQL 数据库 ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sentinel_postgres
    restart: always
    environment:
      POSTGRES_USER: sentinel_admin
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: sentinel_db
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"   # 宿主机 5433（保留，方便本地 conda 直连调试）
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_admin -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis（TaskIQ 队列 + 结果后端）─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 后端 API 服务（FastAPI / uvicorn）─────────────────────────────────
  api:
    build:
      context: ./sentinel_backend
      dockerfile: Dockerfile
    image: sentinel-backend:latest
    container_name: sentinel_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 容器内通过服务名互联（覆盖 config.py 中的本地默认值）
      DATABASE_URL: "postgresql+asyncpg://sentinel_admin:123456@db:5432/sentinel_db"
      REDIS_URL: "redis://redis:6379/0"
      # ML 接口未就绪期间保持 Mock 模式，可独立演示完整流程
      ML_MOCK_MODE: "true"
      TZ: Asia/Shanghai
    ports:
      - "18000:18000"
    volumes:
      - uploads_data:/app/uploads   # 与 worker 共享上传源码
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "18000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 后台任务 Worker（TaskIQ 消费进程）─────────────────────────────────
  worker:
    build:
      context: ./sentinel_backend
      dockerfile: Dockerfile
    image: sentinel-backend:latest
    container_name: sentinel_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://sentinel_admin:123456@db:5432/sentinel_db"
      REDIS_URL: "redis://redis:6379/0"
      ML_MOCK_MODE: "true"
      TZ: Asia/Shanghai
    volumes:
      - uploads_data:/app/uploads   # 读取 api 写入的上传源码
      # 动态验证沙箱需要宿主机 Docker（属安全侧，未启用时可忽略）：
      # - /var/run/docker.sock:/var/run/docker.sock
    # 关键：从 app.main 启动 broker，确保 SentinelMiddleware 被加载
    # （broker.py 的 docstring 命令不会注册中间件，会导致状态/WS 推送失效）
    command: ["taskiq", "worker", "app.main:broker", "--workers", "1"]

  # ── 前端（Vue 构建产物 + Nginx）───────────────────────────────────────
  frontend:
    build:
      context: ./sentinel_frontend
      dockerfile: Dockerfile
    image: sentinel-frontend:latest
    container_name: sentinel_frontend
    restart: always
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
